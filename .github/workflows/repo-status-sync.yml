# リポジトリ状態同期ワークフロー
# KenichiroAraiの全リポジトリの状態を定期的に取得してIssueとして管理する
name: リポジトリ状態をIssueに同期

on:
  schedule:
    - cron: "0 0 * * *" # 毎日午前9時（JST）に実行（UTC 0:00）
  workflow_dispatch: # 手動実行も可能
    inputs:
      target_user: # 入力IDは英数字で
        description: "対象ユーザー名（例: KenichiroArai）"
        required: true
        default: "KenichiroArai"

jobs:
  sync-repo-status: # ジョブIDは英数字で
    name: リポジトリ状態の同期
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      # ステップ0: リポジトリをチェックアウト（gh CLIを使用するため）
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # ステップ1: KenichiroAraiユーザーの全リポジトリを取得
      - name: 全リポジトリを取得
        id: repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "全リポジトリを取得中..."

          # workflow_dispatch の入力があればそれを使う。なければデフォルトのユーザー名を使う
          TARGET_USER="${{ github.event.inputs.target_user || 'KenichiroArai' }}"

          # gh apiコマンドを使用してリポジトリ一覧を取得（より信頼性が高い）
          # per_page=100で最大100件まで取得
          response=$(gh api /users/"$TARGET_USER"/repos?per_page=100 --paginate)

          # デバッグ: APIレスポンスの最初の500文字を表示
          echo "APIレスポンス（最初の500文字）:"
          echo "$response" | head -c 500
          echo ""

          # リポジトリのfull_nameを抽出
          repos=$(echo "$response" | jq -r '.[].full_name' | tr '\n' ' ')

          # 環境変数に保存して次のステップで使用できるようにする
          echo "repos=$repos" >> $GITHUB_ENV
          echo "取得したリポジトリ: $repos"

      # ステップ2: 各リポジトリの状態をIssueに同期
      - name: リポジトリ状態をIssueに同期
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # リポジトリが取得できているか確認
          if [ -z "$repos" ]; then
            echo "エラー: リポジトリリストが空です"
            exit 1
          fi

          # 取得した全リポジトリをループ処理
          for repo in $repos; do
            echo "リポジトリ $repo を処理中..."

            # エラーが発生しても処理を継続する
            {
              # GitHub APIからリポジトリの詳細情報を取得（gh apiを使用）
              data=$(gh api /repos/$repo)

              if [ -z "$data" ]; then
                echo "警告: $repo のデータ取得に失敗しました。スキップします。"
                continue
              fi

              # 必要な情報をJSONから抽出
              name=$(echo "$data" | jq -r .name)
              description=$(echo "$data" | jq -r '.description // "説明なし"')
              stars=$(echo "$data" | jq -r .stargazers_count)
              forks=$(echo "$data" | jq -r .forks_count)
              watchers=$(echo "$data" | jq -r .watchers_count)
              open_issues=$(echo "$data" | jq -r .open_issues_count)
              repo_size=$(echo "$data" | jq -r .size)
              language=$(echo "$data" | jq -r '.language // "不明"')
              license=$(echo "$data" | jq -r '.license.name // "ライセンスなし"')
              topics=$(echo "$data" | jq -r '.topics | join(", ") | if . == "" then "トピックなし" else . end')
              archived=$(echo "$data" | jq -r .archived)
              is_private=$(echo "$data" | jq -r .private)
              default_branch=$(echo "$data" | jq -r .default_branch)
              has_issues=$(echo "$data" | jq -r .has_issues)
              has_wiki=$(echo "$data" | jq -r .has_wiki)
              has_projects=$(echo "$data" | jq -r .has_projects)
              homepage=$(echo "$data" | jq -r '.homepage // ""')
              created_at=$(echo "$data" | jq -r .created_at)
              updated_at=$(echo "$data" | jq -r .updated_at)
              pushed_at=$(echo "$data" | jq -r .pushed_at)

              # サイズを読みやすい形式に変換（KB → MB）
              if [ "$repo_size" -ge 1024 ]; then
                # シェルの算術演算を使用（bcは不要）
                mb_size=$(( repo_size / 1024 ))
                repo_size_display="${mb_size} MB"
              else
                repo_size_display="$repo_size KB"
              fi

              # 日時を日付形式に変換（エラーハンドリング付き）
              created_date=$(date -d "$created_at" +%Y-%m-%d 2>/dev/null || echo "不明")
              updated_date=$(date -d "$updated_at" +%Y-%m-%d 2>/dev/null || echo "不明")
              pushed_date=$(date -d "$pushed_at" +%Y-%m-%d 2>/dev/null || echo "不明")

              # 最終Push日からの経過日数を計算（エラーハンドリング付き）
              now=$(date -u +%s 2>/dev/null || echo "0")
              pushed_sec=$(date -d "$pushed_at" +%s 2>/dev/null || echo "0")

              if [ "$now" != "0" ] && [ "$pushed_sec" != "0" ]; then
                diff_days=$(( (now - pushed_sec) / 86400 ))

                # 経過日数によってステータスを決定
                if [ $diff_days -le 7 ]; then
                  # 7日以内: アクティブ
                  status="🟢 アクティブ"
                elif [ $diff_days -le 30 ]; then
                  # 8-30日: 最近アクティブ
                  status="🟡 最近アクティブ"
                else
                  # 30日以上: 停滞中
                  status="🔴 停滞中"
                fi
              else
                # 日付計算できない場合
                status="⚠️ 不明"
              fi

              # アーカイブ状態の表示
              if [ "$archived" = "true" ]; then
                archive_status="📦 アーカイブ済み"
              else
                archive_status="✅ アクティブ"
              fi

              # 公開状態の表示
              if [ "$is_private" = "true" ]; then
                visibility="🔒 プライベート"
              else
                visibility="🔓 パブリック"
              fi

              # 機能の有効状態
              issues_status=$([ "$has_issues" = "true" ] && echo "✅" || echo "❌")
              wiki_status=$([ "$has_wiki" = "true" ] && echo "✅" || echo "❌")
              projects_status=$([ "$has_projects" = "true" ] && echo "✅" || echo "❌")

              # 最新リリース情報を取得（エラーが出ても続行）
              release_response=$(gh api /repos/$repo/releases/latest 2>&1 || echo "")

              # レスポンスがエラーメッセージ（JSON形式のエラー）かどうかを確認
              if echo "$release_response" | grep -q '"message"'; then
                # エラーの場合
                release_info="リリースなし"
              elif [ -n "$release_response" ]; then
                # 正常なレスポンスの場合
                latest_release=$(echo "$release_response" | jq -r '.tag_name // empty')
                if [ -n "$latest_release" ] && [ "$latest_release" != "null" ]; then
                  release_date=$(echo "$release_response" | jq -r '.published_at')
                  release_date_formatted=$(date -d "$release_date" +%Y-%m-%d 2>/dev/null || echo "")
                  if [ -n "$release_date_formatted" ]; then
                    release_info="**$latest_release** ($release_date_formatted)"
                  else
                    release_info="**$latest_release**"
                  fi
                else
                  release_info="リリースなし"
                fi
              else
                release_info="リリースなし"
              fi

              # ホームページURLの処理
              if [ -n "$homepage" ]; then
                homepage_display="🌐 [$homepage]($homepage)"
              else
                homepage_display="ホームページ未設定"
              fi

              # Issueの本文を作成（グループ分けして整理）
              # 先頭のスペースを削除してマークダウンを正しく表示
              body_raw="## 📦 リポジトリ: [$repo](https://github.com/$repo)

              ### 📝 説明・設定系
              | 項目 | 内容 |
              |------|------|
              | 説明 | $description |
              | 使用言語 | $language |
              | ライセンス | $license |
              | トピックス | $topics |
              | ホームページ | $homepage_display |

              ### 📊 活動指標系
              | 項目 | 内容 |
              |------|------|
              | スター数 | ⭐ $stars |
              | フォーク数 | 🍴 $forks |
              | ウォッチャー数 | 👀 $watchers |
              | 未解決Issue数 | 🐞 $open_issues |
              | リポジトリサイズ | 💾 $repo_size_display |
              | ステータス | $status |

              ### ⏰ 日時系
              | 項目 | 内容 |
              |------|------|
              | 作成日 | $created_date |
              | 最終更新日 | $updated_date |
              | 最終Push日 | $pushed_date |
              | 最新リリース | $release_info |

              ### 🔧 状態・設定系
              | 項目 | 内容 |
              |------|------|
              | アーカイブ状態 | $archive_status |
              | 公開状態 | $visibility |
              | デフォルトブランチ | $default_branch |
              | Issues | $issues_status |
              | Wiki | $wiki_status |
              | Projects | $projects_status |"

              # 各行の先頭の14文字分のスペースを削除（YAMLのインデントを除去）
              body=$(echo "$body_raw" | sed 's/^              //')

              # 既存のIssueを検索（タイトルで検索）
              issue_number=$(gh issue list --repo "$GITHUB_REPOSITORY" --search "$name in:title" --json number --jq '.[0].number' 2>/dev/null || echo "")

              # Issue番号が取得できなければ新規作成、あれば更新
              if [ -z "$issue_number" ]; then
                echo "$repo の新しいIssueを作成中..."
                gh issue create --repo "$GITHUB_REPOSITORY" \
                  --title "$name" \
                  --body "$body"
              else
                echo "$repo の既存Issue (#$issue_number) を更新中..."
                gh issue edit "$issue_number" --repo "$GITHUB_REPOSITORY" \
                  --body "$body"
              fi

              echo "✅ $repo の処理が完了しました"

            } || {
              # エラーが発生した場合
              echo "❌ エラー: $repo の処理中にエラーが発生しました。次のリポジトリに進みます。"
            }
          done

          echo "全てのリポジトリの処理が完了しました！"
