# リポジトリ状態同期ワークフロー
# KenichiroAraiの全リポジトリの状態を定期的に取得してIssueとして管理する
name: リポジトリ状態をIssueに同期

on:
  schedule:
    - cron: "0 0 * * *" # 毎日午前9時（JST）に実行（UTC 0:00）
  workflow_dispatch: # 手動実行も可能
    inputs:
      target_user: # 入力IDは英数字で
        description: "対象ユーザー名（例: KenichiroArai）"
        required: true
        default: "KenichiroArai"
      project_number:
        description: "Project番号（例: 15）未指定の場合はProject連動なし"
        required: false
        default: "15"
      project_status_field:
        description: "Projectのステータスフィールド名"
        required: false
        default: "Status"

jobs:
  sync-repo-status: # ジョブIDは英数字で
    name: リポジトリ状態の同期
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      # ステップ0: リポジトリをチェックアウト（gh CLIを使用するため）
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # ステップ1: KenichiroAraiユーザーの全リポジトリを取得
      - name: 全リポジトリを取得
        id: repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "全リポジトリを取得中..."

          # workflow_dispatch の入力があればそれを使う。なければデフォルトのユーザー名を使う
          TARGET_USER="${{ github.event.inputs.target_user || 'KenichiroArai' }}"

          # gh apiコマンドを使用してリポジトリ一覧を取得（より信頼性が高い）
          # per_page=100で最大100件まで取得
          response=$(gh api /users/"$TARGET_USER"/repos?per_page=100 --paginate)

          # デバッグ: APIレスポンスの最初の500文字を表示
          echo "APIレスポンス（最初の500文字）:"
          echo "$response" | head -c 500
          echo ""

          # リポジトリのfull_nameを抽出
          repos=$(echo "$response" | jq -r '.[].full_name' | tr '\n' ' ')

          # 環境変数に保存して次のステップで使用できるようにする
          echo "repos=$repos" >> $GITHUB_ENV
          echo "取得したリポジトリ: $repos"

      # ステップ2: Project情報を取得（project_numberが指定されている場合のみ）
      - name: Project情報を取得
        if: github.event.inputs.project_number != ''
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          PROJECT_NUMBER="${{ github.event.inputs.project_number }}"
          STATUS_FIELD_NAME="${{ github.event.inputs.project_status_field || 'Status' }}"
          TARGET_USER="${{ github.event.inputs.target_user || 'KenichiroArai' }}"

          echo "Project #$PROJECT_NUMBER の情報を取得中..."

          # GraphQL APIでProject情報を取得
          PROJECT_QUERY='query($user: String!, $number: Int!) {
            user(login: $user) {
              projectV2(number: $number) {
                id
                fields(first: 20) {
                  nodes {
                    ... on ProjectV2SingleSelectField {
                      id
                      name
                      options {
                        id
                        name
                      }
                    }
                  }
                }
              }
            }
          }'

          # GraphQL APIを実行
          project_response=$(gh api graphql -f query="$PROJECT_QUERY" -f user="$TARGET_USER" -F number="$PROJECT_NUMBER" 2>&1)

          if [ $? -ne 0 ]; then
            echo "⚠️ 警告: Project情報の取得に失敗しました"
            echo "$project_response"
            echo "Project連動をスキップします"
            echo "PROJECT_ID=" >> $GITHUB_ENV
            echo "STATUS_FIELD_ID=" >> $GITHUB_ENV
            exit 0
          fi

          # Project IDを抽出
          PROJECT_ID=$(echo "$project_response" | jq -r '.data.user.projectV2.id // empty')

          if [ -z "$PROJECT_ID" ]; then
            echo "⚠️ 警告: Project #$PROJECT_NUMBER が見つかりませんでした"
            echo "Project連動をスキップします"
            echo "PROJECT_ID=" >> $GITHUB_ENV
            echo "STATUS_FIELD_ID=" >> $GITHUB_ENV
            exit 0
          fi

          echo "Project ID: $PROJECT_ID"

          # ステータスフィールドを検索
          STATUS_FIELD=$(echo "$project_response" | jq -r --arg name "$STATUS_FIELD_NAME" '.data.user.projectV2.fields.nodes[] | select(.name == $name)')

          if [ -z "$STATUS_FIELD" ] || [ "$STATUS_FIELD" = "null" ]; then
            echo "⚠️ 警告: ステータスフィールド '$STATUS_FIELD_NAME' が見つかりませんでした"
            echo "Project連動をスキップします"
            echo "PROJECT_ID=" >> $GITHUB_ENV
            echo "STATUS_FIELD_ID=" >> $GITHUB_ENV
            exit 0
          fi

          STATUS_FIELD_ID=$(echo "$STATUS_FIELD" | jq -r '.id')
          echo "ステータスフィールドID: $STATUS_FIELD_ID"

          # ステータスオプションIDを取得
          OPTION_FREQUENT=$(echo "$STATUS_FIELD" | jq -r '.options[] | select(.name == "頻繁に更新") | .id')
          OPTION_REGULAR=$(echo "$STATUS_FIELD" | jq -r '.options[] | select(.name == "定期的に更新") | .id')
          OPTION_OCCASIONAL=$(echo "$STATUS_FIELD" | jq -r '.options[] | select(.name == "時々更新") | .id')
          OPTION_RARE=$(echo "$STATUS_FIELD" | jq -r '.options[] | select(.name == "更新が少ない") | .id')
          OPTION_STALE=$(echo "$STATUS_FIELD" | jq -r '.options[] | select(.name == "停滞中") | .id')

          echo "ステータスオプション:"
          echo "  頻繁に更新: $OPTION_FREQUENT"
          echo "  定期的に更新: $OPTION_REGULAR"
          echo "  時々更新: $OPTION_OCCASIONAL"
          echo "  更新が少ない: $OPTION_RARE"
          echo "  停滞中: $OPTION_STALE"

          # 環境変数に保存
          echo "PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV
          echo "STATUS_FIELD_ID=$STATUS_FIELD_ID" >> $GITHUB_ENV
          echo "OPTION_FREQUENT=$OPTION_FREQUENT" >> $GITHUB_ENV
          echo "OPTION_REGULAR=$OPTION_REGULAR" >> $GITHUB_ENV
          echo "OPTION_OCCASIONAL=$OPTION_OCCASIONAL" >> $GITHUB_ENV
          echo "OPTION_RARE=$OPTION_RARE" >> $GITHUB_ENV
          echo "OPTION_STALE=$OPTION_STALE" >> $GITHUB_ENV

          echo "✅ Project情報の取得が完了しました"

      # ステップ3: 各リポジトリの状態をIssueに同期
      - name: リポジトリ状態をIssueに同期
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # リポジトリが取得できているか確認
          if [ -z "$repos" ]; then
            echo "エラー: リポジトリリストが空です"
            exit 1
          fi

          # 取得した全リポジトリをループ処理
          for repo in $repos; do
            echo "リポジトリ $repo を処理中..."

            # エラーが発生しても処理を継続する
            {
              # GitHub APIからリポジトリの詳細情報を取得（gh apiを使用）
              data=$(gh api /repos/$repo)

              if [ -z "$data" ]; then
                echo "警告: $repo のデータ取得に失敗しました。スキップします。"
                continue
              fi

              # 必要な情報をJSONから抽出
              name=$(echo "$data" | jq -r .name)
              description=$(echo "$data" | jq -r '.description // "説明なし"')
              stars=$(echo "$data" | jq -r .stargazers_count)
              forks=$(echo "$data" | jq -r .forks_count)
              watchers=$(echo "$data" | jq -r .watchers_count)
              open_issues=$(echo "$data" | jq -r .open_issues_count)
              repo_size=$(echo "$data" | jq -r .size)
              language=$(echo "$data" | jq -r '.language // "不明"')
              license=$(echo "$data" | jq -r '.license.name // "ライセンスなし"')
              topics=$(echo "$data" | jq -r '.topics | join(", ") | if . == "" then "トピックなし" else . end')
              archived=$(echo "$data" | jq -r .archived)
              is_private=$(echo "$data" | jq -r .private)
              default_branch=$(echo "$data" | jq -r .default_branch)
              has_issues=$(echo "$data" | jq -r .has_issues)
              has_wiki=$(echo "$data" | jq -r .has_wiki)
              has_projects=$(echo "$data" | jq -r .has_projects)
              homepage=$(echo "$data" | jq -r '.homepage // ""')
              created_at=$(echo "$data" | jq -r .created_at)
              updated_at=$(echo "$data" | jq -r .updated_at)
              pushed_at=$(echo "$data" | jq -r .pushed_at)

              # サイズを読みやすい形式に変換（KB → MB）
              if [ "$repo_size" -ge 1024 ]; then
                # シェルの算術演算を使用（bcは不要）
                mb_size=$(( repo_size / 1024 ))
                repo_size_display="${mb_size} MB"
              else
                repo_size_display="$repo_size KB"
              fi

              # 日時を日付形式に変換（エラーハンドリング付き）
              created_date=$(date -d "$created_at" +%Y-%m-%d 2>/dev/null || echo "不明")
              updated_date=$(date -d "$updated_at" +%Y-%m-%d 2>/dev/null || echo "不明")
              pushed_date=$(date -d "$pushed_at" +%Y-%m-%d 2>/dev/null || echo "不明")

              # 最終Push日からの経過日数を計算（エラーハンドリング付き）
              now=$(date -u +%s 2>/dev/null || echo "0")
              pushed_sec=$(date -d "$pushed_at" +%s 2>/dev/null || echo "0")

              if [ "$now" != "0" ] && [ "$pushed_sec" != "0" ]; then
                diff_days=$(( (now - pushed_sec) / 86400 ))

                # 経過日数によってステータスを決定（5段階）
                if [ $diff_days -le 7 ]; then
                  # 7日以内: 頻繁に更新
                  status="頻繁に更新"
                elif [ $diff_days -le 30 ]; then
                  # 8-30日: 定期的に更新
                  status="定期的に更新"
                elif [ $diff_days -le 180 ]; then
                  # 31-180日: 時々更新
                  status="時々更新"
                elif [ $diff_days -le 365 ]; then
                  # 181-365日: 更新が少ない
                  status="更新が少ない"
                else
                  # 366日以上: 停滞中
                  status="停滞中"
                fi
              else
                # 日付計算できない場合
                status="⚠️ 不明"
              fi

              # アーカイブ状態の表示
              if [ "$archived" = "true" ]; then
                archive_status="📦 アーカイブ済み"
              else
                archive_status="✅ アクティブ"
              fi

              # 公開状態の表示
              if [ "$is_private" = "true" ]; then
                visibility="🔒 プライベート"
              else
                visibility="🔓 パブリック"
              fi

              # 機能の有効状態
              issues_status=$([ "$has_issues" = "true" ] && echo "✅" || echo "❌")
              wiki_status=$([ "$has_wiki" = "true" ] && echo "✅" || echo "❌")
              projects_status=$([ "$has_projects" = "true" ] && echo "✅" || echo "❌")

              # 最新リリース情報を取得（エラーが出ても続行）
              release_response=$(gh api /repos/$repo/releases/latest 2>&1 || echo "")

              # レスポンスがエラーメッセージ（JSON形式のエラー）かどうかを確認
              if echo "$release_response" | grep -q '"message"'; then
                # エラーの場合
                release_info="リリースなし"
              elif [ -n "$release_response" ]; then
                # 正常なレスポンスの場合
                latest_release=$(echo "$release_response" | jq -r '.tag_name // empty')
                if [ -n "$latest_release" ] && [ "$latest_release" != "null" ]; then
                  release_date=$(echo "$release_response" | jq -r '.published_at')
                  release_date_formatted=$(date -d "$release_date" +%Y-%m-%d 2>/dev/null || echo "")
                  if [ -n "$release_date_formatted" ]; then
                    release_info="**$latest_release** ($release_date_formatted)"
                  else
                    release_info="**$latest_release**"
                  fi
                else
                  release_info="リリースなし"
                fi
              else
                release_info="リリースなし"
              fi

              # ホームページURLの処理
              if [ -n "$homepage" ]; then
                homepage_display="🌐 [$homepage]($homepage)"
              else
                homepage_display="ホームページ未設定"
              fi

              # Issueの本文を作成（グループ分けして整理）
              # printfを使用してタブやインデントの問題を回避
              body=$(printf '%s\n' \
                "## 📦 リポジトリ: [$repo](https://github.com/$repo)" \
                "" \
                "### 📝 説明・設定系" \
                "| 項目 | 内容 |" \
                "|------|------|" \
                "| 説明 | $description |" \
                "| 使用言語 | $language |" \
                "| ライセンス | $license |" \
                "| トピックス | $topics |" \
                "| ホームページ | $homepage_display |" \
                "" \
                "### 📊 活動指標系" \
                "| 項目 | 内容 |" \
                "|------|------|" \
                "| スター数 | ⭐ $stars |" \
                "| フォーク数 | 🍴 $forks |" \
                "| ウォッチャー数 | 👀 $watchers |" \
                "| 未解決Issue数 | 🐞 $open_issues |" \
                "| リポジトリサイズ | 💾 $repo_size_display |" \
                "| ステータス | $status |" \
                "" \
                "### ⏰ 日時系" \
                "| 項目 | 内容 |" \
                "|------|------|" \
                "| 作成日 | $created_date |" \
                "| 最終更新日 | $updated_date |" \
                "| 最終Push日 | $pushed_date |" \
                "| 最新リリース | $release_info |" \
                "" \
                "### 🔧 状態・設定系" \
                "| 項目 | 内容 |" \
                "|------|------|" \
                "| アーカイブ状態 | $archive_status |" \
                "| 公開状態 | $visibility |" \
                "| デフォルトブランチ | $default_branch |" \
                "| Issues | $issues_status |" \
                "| Wiki | $wiki_status |" \
                "| Projects | $projects_status |")

              # 既存のIssueを検索（タイトルで検索）
              issue_number=$(gh issue list --repo "$GITHUB_REPOSITORY" --search "$name in:title" --json number --jq '.[0].number' 2>/dev/null || echo "")

              # Issue番号が取得できなければ新規作成、あれば更新
              if [ -z "$issue_number" ]; then
                echo "$repo の新しいIssueを作成中..."
                issue_url=$(gh issue create --repo "$GITHUB_REPOSITORY" \
                  --title "$name" \
                  --body "$body")
                # 作成されたIssue番号を抽出
                issue_number=$(echo "$issue_url" | grep -oP '\d+$')
                echo "作成されたIssue: #$issue_number"
              else
                echo "$repo の既存Issue (#$issue_number) を更新中..."
                gh issue edit "$issue_number" --repo "$GITHUB_REPOSITORY" \
                  --body "$body"
              fi

              # Issueの状態を確認（open/closed）
              issue_state=$(gh issue view "$issue_number" --repo "$GITHUB_REPOSITORY" --json state --jq '.state' 2>/dev/null || echo "")

              echo "Issue #$issue_number の状態: $issue_state"

              # Project連動処理（PROJECT_IDが設定されている場合のみ）
              if [ -n "$PROJECT_ID" ] && [ -n "$STATUS_FIELD_ID" ]; then
                # Issueがclosedの場合はステータス更新をスキップ
                if [ "$issue_state" = "CLOSED" ]; then
                  echo "⏭️  Issue #$issue_number はclosedのため、Projectステータス更新をスキップします"
                else
                  echo "🔄 Issue #$issue_number をProject #${{ github.event.inputs.project_number }} に追加・更新中..."

                  # ステータスに応じたオプションIDを決定（5段階）
                  if [ "$status" = "頻繁に更新" ]; then
                    status_option_id="$OPTION_FREQUENT"
                  elif [ "$status" = "定期的に更新" ]; then
                    status_option_id="$OPTION_REGULAR"
                  elif [ "$status" = "時々更新" ]; then
                    status_option_id="$OPTION_OCCASIONAL"
                  elif [ "$status" = "更新が少ない" ]; then
                    status_option_id="$OPTION_RARE"
                  elif [ "$status" = "停滞中" ]; then
                    status_option_id="$OPTION_STALE"
                  else
                    status_option_id=""
                  fi

                  if [ -z "$status_option_id" ]; then
                    echo "⚠️ 警告: ステータス '$status' に対応するオプションIDが見つかりません。スキップします。"
                  else
                    # IssueのGlobal IDを取得
                    issue_global_id=$(gh issue view "$issue_number" --repo "$GITHUB_REPOSITORY" --json id --jq '.id' 2>/dev/null || echo "")

                    if [ -z "$issue_global_id" ]; then
                      echo "⚠️ 警告: Issue #$issue_number のGlobal IDを取得できませんでした"
                    else
                      # ProjectにIssueを追加（既に追加済みの場合はitem_idを取得）
                      add_item_mutation='mutation($projectId: ID!, $contentId: ID!) {
                        addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                          item {
                            id
                          }
                        }
                      }'

                      add_response=$(gh api graphql \
                        --header "Authorization: Bearer ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}" \
                        -f query="$add_item_mutation" \
                        -f projectId="$PROJECT_ID" \
                        -f contentId="$issue_global_id" 2>&1)

                      # レスポンスからitem_idを取得（エラーの場合は既存のitem_idを取得）
                      item_id=$(echo "$add_response" | jq -r '.data.addProjectV2ItemById.item.id // empty' 2>/dev/null)

                      # 既に追加済みの場合はProjectからitem_idを取得
                      if [ -z "$item_id" ]; then
                        echo "既にProjectに追加済み。Item IDを取得中..."

                        get_item_query='query($projectId: ID!) {
                          node(id: $projectId) {
                            ... on ProjectV2 {
                              items(first: 100) {
                                nodes {
                                  id
                                  content {
                                    ... on Issue {
                                      id
                                      number
                                    }
                                  }
                                }
                              }
                            }
                          }
                        }'

                        items_response=$(gh api graphql \
                          --header "Authorization: Bearer ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}" \
                          -f query="$get_item_query" \
                          -f projectId="$PROJECT_ID" 2>&1)

                        item_id=$(echo "$items_response" | jq -r --arg issue_id "$issue_global_id" '.data.node.items.nodes[] | select(.content.id == $issue_id) | .id' 2>/dev/null)
                      fi

                      if [ -z "$item_id" ]; then
                        echo "⚠️ 警告: ProjectへのIssue追加に失敗しました"
                      else
                        echo "Project Item ID: $item_id"

                        # ステータスフィールドを更新
                        update_field_mutation='mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: ProjectV2FieldValue!) {
                          updateProjectV2ItemFieldValue(input: {projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: $value}) {
                            projectV2Item {
                              id
                            }
                          }
                        }'

                        update_response=$(gh api graphql \
                          --header "Authorization: Bearer ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}" \
                          -f query="$update_field_mutation" \
                          -f projectId="$PROJECT_ID" \
                          -f itemId="$item_id" \
                          -f fieldId="$STATUS_FIELD_ID" \
                          -f value="{\"singleSelectOptionId\":\"$status_option_id\"}" 2>&1)

                        if echo "$update_response" | grep -q '"projectV2Item"'; then
                          echo "✅ Projectステータスを '$status' に更新しました"
                        else
                          echo "⚠️ 警告: Projectステータスの更新に失敗しました"
                          echo "$update_response"
                        fi
                      fi
                    fi
                  fi
                fi
              fi

              echo "✅ $repo の処理が完了しました"

            } || {
              # エラーが発生した場合
              echo "❌ エラー: $repo の処理中にエラーが発生しました。次のリポジトリに進みます。"
            }
          done

          echo "全てのリポジトリの処理が完了しました！"
