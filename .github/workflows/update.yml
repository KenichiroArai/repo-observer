# リポジトリIssueダッシュボード更新ワークフロー
# 各リポジトリの状態を定期的に取得してIssueとして管理する
name: Update Repository Issues Dashboard

on:
  schedule:
    - cron: "0 0 * * *" # 毎日午前9時（JST）に実行（UTC 0:00）
  workflow_dispatch: # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # ステップ1: KenichiroAraiユーザーの全リポジトリを取得
      - name: KenichiroAraiの全リポジトリを取得
        id: repos
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "KenichiroAraiの全リポジトリを取得中..."

          # GitHub APIを使用してリポジトリ一覧を取得
          # per_page=100で最大100件まで取得（必要に応じて調整可能）
          repos=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/users/KenichiroArai/repos?per_page=100" | \
            jq -r '.[].full_name' | tr '\n' ' ')

          # 環境変数に保存して次のステップで使用できるようにする
          echo "repos=$repos" >> $GITHUB_ENV
          echo "取得したリポジトリ: $repos"

      # ステップ2: 各リポジトリのIssueを更新または作成
      - name: リポジトリのIssueを更新または作成
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # 取得した全リポジトリをループ処理
          for repo in $repos; do
            echo "リポジトリ $repo を処理中..."

            # GitHub APIからリポジトリの詳細情報を取得
            data=$(curl -s -H "Authorization: token $GH_TOKEN" \
              https://api.github.com/repos/$repo)

            # 必要な情報をJSONから抽出
            name=$(echo "$data" | jq -r .name)
            stars=$(echo "$data" | jq -r .stargazers_count)
            open_issues=$(echo "$data" | jq -r .open_issues_count)
            pushed_at=$(echo "$data" | jq -r .pushed_at)

            # 最終Push日時を日付形式に変換
            pushed_date=$(date -d "$pushed_at" +%Y-%m-%d)

            # 最終Push日からの経過日数を計算
            now=$(date -u +%s)
            pushed_sec=$(date -d "$pushed_at" +%s)
            diff_days=$(( (now - pushed_sec) / 86400 ))

            # 経過日数によってステータスとラベルを決定
            if [ $diff_days -le 7 ]; then
              # 7日以内: アクティブ
              status="🟢 アクティブ"
              label="active"
            elif [ $diff_days -le 30 ]; then
              # 8-30日: 最近アクティブ
              status="🟡 最近アクティブ"
              label="recent"
            else
              # 30日以上: 停滞中
              status="🔴 停滞中"
              label="stale"
            fi

            # Issueの本文を作成
            body="### 📦 リポジトリ: [$repo](https://github.com/$repo)
            - ⭐ スター数: **$stars**
            - 🐞 未解決Issue数: **$open_issues**
            - ⏰ 最終Push日: **$pushed_date**
            - 🏷️ ステータス: **$status**"

            # 既存のIssueを検索（リポジトリ名ラベルで検索）
            gh issue list --label "$repo" --json number --jq '.[0].number' > issue.txt || true
            issue_number=$(cat issue.txt)

            # Issue番号が取得できなければ新規作成、あれば更新
            if [ -z "$issue_number" ]; then
              echo "$repo の新しいIssueを作成中..."
              gh issue create --title "📊 $repo ステータス" \
                --body "$body" \
                --label "$repo,$label,auto-report"
            else
              echo "$repo の既存Issue (#$issue_number) を更新中..."
              # 既存のステータスラベルを削除して新しいラベルを追加
              gh issue edit "$issue_number" --body "$body" --add-label "$label" --remove-label "active,recent,stale"
            fi
          done
